name: CI

on:
    push:
        branches: [main]
    pull_request:
    workflow_call:
        inputs:
            ref:
                description: Git ref to checkout (optional; defaults to triggering ref)
                required: false
                type: string

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        runs-on: ubuntu-latest
        env:
            HUSKY: '0'
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ inputs.ref || github.ref }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Format check
              run: bun run format:check

            - name: Fallow
              run: bun run fallow:check

            - name: Typecheck
              run: bun run typecheck

            - name: Test
              run: bun run test
