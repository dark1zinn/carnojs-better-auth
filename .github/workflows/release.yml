name: Release

on:
    push:
        tags:
            - 'v*.*.*'
    workflow_dispatch:
        inputs:
            tag:
                description: 'Release tag (e.g. v0.1.0). Must match package.json version.'
                required: true
                type: string

permissions:
    contents: write

concurrency:
    group: release-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    ci:
        uses: ./.github/workflows/ci.yml
        with:
            ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

    publish:
        needs: ci
        runs-on: ubuntu-latest
        steps:
            - name: Resolve release tag
              id: meta
              run: |
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                    TAG="${{ github.event.inputs.tag }}"
                  else
                    TAG="${GITHUB_REF_NAME}"
                  fi

                  if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                    echo "::error::Invalid tag format: $TAG (expected vX.Y.Z)"
                    exit 1
                  fi

                  echo "tag=$TAG" >> "$GITHUB_OUTPUT"
                  echo "Release tag: $TAG"

            - name: Checkout
              uses: actions/checkout@v4
              with:
                  ref: ${{ steps.meta.outputs.tag }}

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Verify package.json version matches tag
              run: |
                  TAG="${{ steps.meta.outputs.tag }}"
                  EXPECTED="${TAG#v}"
                  PKG="$(bun pm pkg get version | tr -d '"[:space:]')"

                  echo "Tag version: $EXPECTED"
                  echo "package.json version: $PKG"

                  if [ "$PKG" != "$EXPECTED" ]; then
                    echo "::error::package.json version ($PKG) does not match tag ($EXPECTED)"
                    exit 1
                  fi

            - name: Build
              run: bun run build

            - name: Configure npm authentication
              run: |
                  echo "//registry.npmjs.org/:_authToken=${NPM_CONFIG_TOKEN}" > "${HOME}/.npmrc"
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Publish to npm
              run: bun publish --access public
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ steps.meta.outputs.tag }}
                  generate_release_notes: true
